name: Tests

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start web server
        run: |
          # Einfacher Python HTTP Server als Alternative zu Tomcat
          cd ${{ github.workspace }}
          python3 -m http.server 8080 &
          sleep 2

      - name: Run Playwright tests
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/tests:/work/tests:ro \
            -e BASE_URL=http://localhost:8080 \
            mcr.microsoft.com/playwright:v1.52.0-noble \
            bash -c "cd /work && npm init -y && npm install @playwright/test@1.52.0 && npx playwright test --project='iPhone 14' --project='Desktop 1024'"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/test-results/
          retention-days: 7

  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML with html-validate
        run: |
          docker run --rm -v ${{ github.workspace }}:/src ghcr.io/nickmccurdy/html-validate:latest \
            /src/*.html || true

  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start web server
        run: |
          python3 -m http.server 8080 &
          sleep 2

      - name: Run Lighthouse
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/lighthouse-results:/results \
            femtopixel/google-lighthouse \
            --chrome-flags="--headless --no-sandbox" \
            --output=json --output=html \
            --output-path=/results/report \
            http://localhost:8080/index2.html || true

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-results/
          retention-days: 7
